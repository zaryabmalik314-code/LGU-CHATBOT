<!DOCTYPE html>
<html lang="en">
<head>
<script>
  // Auth guard — redirect to login if not logged in
  if (!localStorage.getItem("lguUser")) {
    window.location.href = "login.html";
  }
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LGU Assistant</title>
<style>
  :root{
    --navy-950:#060d18;
    --navy-900:#0a1628;
    --navy-800:#0f2038;
    --navy-700:#16304f;
    --navy-600:#1d4067;
    --gold-500:#c9a84c;
    --gold-400:#dabf73;
    --gold-300:#e8d6a0;
    --ink-50:#f4f1e8;
    --ink-200:#cdd6e3;
    --ink-400:#8a9bb3;
    --danger:#c25b4a;
    --radius-lg:18px;
    --radius-md:12px;
    --radius-sm:8px;
    --font-display:'Spectral', Georgia, 'Times New Roman', serif;
    --font-body:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:
      radial-gradient(ellipse 900px 600px at 15% -10%, rgba(201,168,76,0.10), transparent 60%),
      radial-gradient(ellipse 700px 500px at 110% 10%, rgba(29,64,103,0.35), transparent 60%),
      var(--navy-950);
    color:var(--ink-200);
    display:flex;
    justify-content:center;
    min-height:100%;
  }

  .app{
    width:100%;
    max-width:760px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:linear-gradient(180deg, var(--navy-900) 0%, var(--navy-950) 100%);
    box-shadow:0 0 80px rgba(0,0,0,0.5);
    position:relative;
  }

  /* ---------- Header ---------- */
  .header{
    position:sticky;
    top:0;
    z-index:20;
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 20px;
    background:linear-gradient(180deg, rgba(10,22,40,0.97), rgba(10,22,40,0.88));
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(201,168,76,0.22);
  }

  .crest{
    flex:0 0 auto;
    width:46px;
    height:46px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0d1f12;
    box-shadow:0 0 0 1px rgba(201,168,76,0.4), 0 4px 14px rgba(201,168,76,0.25);
    position:relative;
    overflow:hidden;
  }
  .crest img{width:100%;height:100%;object-fit:cover;}

  .header-text{flex:1;min-width:0;}
  .header-text h1{
    font-family:var(--font-display);
    font-size:18px;
    letter-spacing:0.02em;
    margin:0;
    color:var(--gold-300);
    font-weight:600;
  }
  .header-text p{
    margin:1px 0 0;
    font-size:11.5px;
    color:var(--ink-400);
    letter-spacing:0.06em;
    text-transform:uppercase;
  }

  .status-dot{
    width:8px;height:8px;border-radius:50%;
    background:#5fd08a;
    box-shadow:0 0 0 3px rgba(95,208,138,0.18);
    flex:0 0 auto;
  }
  .header-status{
    display:flex;align-items:center;gap:6px;
    font-size:11px;color:var(--ink-400);
    flex:0 0 auto;
  }

  /* ---------- Chat area ---------- */
  .chat{
    flex:1;
    overflow-y:auto;
    padding:22px 18px 14px;
    display:flex;
    flex-direction:column;
    gap:16px;
    scroll-behavior:smooth;
  }

  .chat::-webkit-scrollbar{width:8px;}
  .chat::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.25);border-radius:8px;}
  .chat::-webkit-scrollbar-track{background:transparent;}

  .row{
    display:flex;
    gap:10px;
    max-width:100%;
    animation:rise 0.28s ease both;
  }
  @keyframes rise{
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
  }
  .row.user{justify-content:flex-end;}
  .row.bot{justify-content:flex-start;}

  .avatar{
    flex:0 0 auto;
    width:30px;height:30px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);
    font-size:12.5px;
    font-weight:700;
  }
  .avatar.bot{
    background:#0d1f12;
    color:var(--navy-950);
    overflow:hidden;
    padding:0;
  }
  .avatar.bot img{width:100%;height:100%;object-fit:cover;}
  .avatar.user{
    background:var(--navy-700);
    color:var(--gold-300);
    border:1px solid rgba(201,168,76,0.3);
  }

  .bubble-wrap{max-width:78%;display:flex;flex-direction:column;gap:6px;}
  .row.user .bubble-wrap{align-items:flex-end;}

  .bubble{
    padding:11px 15px;
    border-radius:var(--radius-md);
    font-size:14.5px;
    line-height:1.55;
    word-wrap:break-word;
    white-space:pre-wrap;
  }
  .row.bot .bubble{
    background:var(--navy-800);
    border:1px solid rgba(201,168,76,0.15);
    color:var(--ink-200);
    border-top-left-radius:4px;
  }
  .row.user .bubble{
    background:linear-gradient(160deg, var(--gold-400), var(--gold-500));
    color:var(--navy-950);
    border-top-right-radius:4px;
    font-weight:500;
  }

  .timestamp{
    font-size:10.5px;
    color:var(--ink-400);
    padding:0 4px;
  }

  /* Speak button on bot bubbles */
  .bubble-actions{
    display:flex;
    gap:8px;
    padding:0 2px;
  }
  .icon-btn-sm{
    background:none;
    border:none;
    color:var(--ink-400);
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:4px;
    font-size:11px;
    padding:2px 4px;
    border-radius:6px;
    transition:color 0.15s, background 0.15s;
    font-family:var(--font-body);
  }
  .icon-btn-sm:hover{color:var(--gold-400);background:rgba(201,168,76,0.08);}
  .icon-btn-sm svg{width:13px;height:13px;}
  .icon-btn-sm.active{color:var(--gold-400);}

  /* ---------- Sources ---------- */
  .sources{
    width:100%;
    max-width:78%;
  }
  .sources-toggle{
    display:flex;
    align-items:center;
    gap:6px;
    background:none;
    border:1px solid rgba(201,168,76,0.25);
    color:var(--gold-400);
    font-size:11.5px;
    padding:5px 10px;
    border-radius:20px;
    cursor:pointer;
    font-family:var(--font-body);
    transition:background 0.15s, border-color 0.15s;
  }
  .sources-toggle:hover{background:rgba(201,168,76,0.08);border-color:rgba(201,168,76,0.45);}
  .sources-toggle svg{width:11px;height:11px;transition:transform 0.2s;}
  .sources-toggle.open svg{transform:rotate(180deg);}

  .sources-list{
    overflow:hidden;
    max-height:0;
    transition:max-height 0.25s ease;
  }
  .sources-list.open{max-height:400px;}
  .sources-inner{
    margin-top:8px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .source-item{
    background:var(--navy-800);
    border:1px solid rgba(201,168,76,0.12);
    border-left:3px solid var(--gold-500);
    border-radius:var(--radius-sm);
    padding:8px 10px;
    font-size:12px;
    color:var(--ink-200);
    line-height:1.4;
  }
  .source-item .src-label{
    color:var(--gold-300);
    font-weight:600;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    display:block;
    margin-bottom:2px;
  }

  /* ---------- Typing indicator ---------- */
  .typing-bubble{
    background:var(--navy-800);
    border:1px solid rgba(201,168,76,0.15);
    border-radius:var(--radius-md);
    border-top-left-radius:4px;
    padding:13px 16px;
    display:flex;
    gap:5px;
    align-items:center;
    width:fit-content;
  }
  .typing-bubble span{
    width:6px;height:6px;border-radius:50%;
    background:var(--gold-400);
    animation:bounce 1.2s infinite ease-in-out;
  }
  .typing-bubble span:nth-child(2){animation-delay:0.15s;}
  .typing-bubble span:nth-child(3){animation-delay:0.3s;}
  @keyframes bounce{
    0%,60%,100%{transform:translateY(0);opacity:0.5;}
    30%{transform:translateY(-5px);opacity:1;}
  }

  /* ---------- Welcome state ---------- */
  .welcome{
    margin:auto 0;
    text-align:center;
    padding:30px 16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
  }
  .welcome .crest-lg{
    width:72px;height:72px;
    border-radius:50%;
    background:#0d1f12;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 1px rgba(201,168,76,0.35), 0 8px 30px rgba(201,168,76,0.2);
    overflow:hidden;
  }
  .welcome .crest-lg img{width:100%;height:100%;object-fit:cover;}
  .welcome h2{
    font-family:var(--font-display);
    color:var(--gold-300);
    font-size:21px;
    margin:0;
    font-weight:600;
  }
  .welcome p{
    color:var(--ink-400);
    font-size:13.5px;
    max-width:320px;
    margin:0;
    line-height:1.5;
  }
  .suggestions{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    margin-top:6px;
  }
  .suggestion-chip{
    background:var(--navy-800);
    border:1px solid rgba(201,168,76,0.22);
    color:var(--ink-200);
    font-size:12.5px;
    padding:8px 13px;
    border-radius:20px;
    cursor:pointer;
    font-family:var(--font-body);
    transition:border-color 0.15s, background 0.15s, transform 0.15s;
  }
  .suggestion-chip:hover{
    border-color:var(--gold-500);
    background:rgba(201,168,76,0.08);
    transform:translateY(-1px);
  }

  /* ---------- Error bubble ---------- */
  .bubble.error{
    background:rgba(194,91,74,0.12);
    border:1px solid rgba(194,91,74,0.4);
    color:#e3a89a;
  }

  /* ---------- Input bar ---------- */
  .input-bar{
    position:sticky;
    bottom:0;
    padding:14px 16px 18px;
    background:linear-gradient(0deg, rgba(6,13,24,0.98), rgba(6,13,24,0.85));
    backdrop-filter:blur(10px);
    border-top:1px solid rgba(201,168,76,0.18);
  }

  .input-shell{
    display:flex;
    align-items:flex-end;
    gap:8px;
    background:var(--navy-800);
    border:1px solid rgba(201,168,76,0.22);
    border-radius:24px;
    padding:6px 6px 6px 16px;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .input-shell:focus-within{
    border-color:rgba(201,168,76,0.55);
    box-shadow:0 0 0 3px rgba(201,168,76,0.08);
  }

  #question-input{
    flex:1;
    border:none;
    background:none;
    outline:none;
    resize:none;
    color:var(--ink-50);
    font-family:var(--font-body);
    font-size:14.5px;
    line-height:1.4;
    max-height:120px;
    padding:9px 0;
  }
  #question-input::placeholder{color:var(--ink-400);}

  .icon-btn{
    flex:0 0 auto;
    width:38px;height:38px;
    border-radius:50%;
    border:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:background 0.15s, transform 0.1s, color 0.15s;
    background:none;
  }
  .icon-btn svg{width:18px;height:18px;}

  .mic-btn{color:var(--ink-200);}
  .mic-btn:hover{background:rgba(201,168,76,0.1);}
  .mic-btn.listening{
    color:var(--navy-950);
    background:var(--danger);
    animation:pulse-mic 1.3s infinite;
  }
  @keyframes pulse-mic{
    0%{box-shadow:0 0 0 0 rgba(194,91,74,0.5);}
    70%{box-shadow:0 0 0 9px rgba(194,91,74,0);}
    100%{box-shadow:0 0 0 0 rgba(194,91,74,0);}
  }

  .send-btn{
    background:linear-gradient(160deg, var(--gold-400), var(--gold-500));
    color:var(--navy-950);
  }
  .send-btn:hover{transform:scale(1.06);}
  .send-btn:disabled{opacity:0.4;cursor:default;transform:none;}

  .voice-hint{
    text-align:center;
    font-size:10.5px;
    color:var(--ink-400);
    margin-top:8px;
    min-height:14px;
  }
  .voice-hint.active{color:var(--danger);}

  /* ---------- Mobile ---------- */
  @media (max-width:480px){
    .app{max-width:100%;}
    .header{padding:13px 14px;}
    .header-text h1{font-size:16.5px;}
    .chat{padding:16px 12px 10px;}
    .bubble-wrap{max-width:86%;}
    .sources{max-width:86%;}
    .input-bar{padding:10px 10px 14px;}
    .header-status{display:none;}
  }
</style>
</head>

  function removeTypingIndicator(){

    if (row) row.remove();

  // ---------- Speech synthesis (voice output) ----------
  function toggleSpeak(text, btn){
    if (!('speechSynthesis' in window)){
      alert('Voice output is not supported in this browser.');
      return;
    }
    if (speaking){
      window.speechSynthesis.cancel();
      speaking = false;
      document.querySelectorAll('.speak-btn.active').forEach(b => {
        b.classList.remove('active');
        b.querySelector('span').textContent = 'Listen';
      });
      return;
    }
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 1;
    utterance.pitch = 1;
    currentUtterance = utterance;
    speaking = true;
    btn.classList.add('active');
    btn.querySelector('span').textContent = 'Stop';

    utterance.onend = () => {
      speaking = false;
      btn.classList.remove('active');
      btn.querySelector('span').textContent = 'Listen';
    };
    utterance.onerror = () => {
      speaking = false;
      btn.classList.remove('active');
      btn.querySelector('span').textContent = 'Listen';
    };

    window.speechSynthesis.cancel(); // stop any prior utterance
    window.speechSynthesis.speak(utterance);
  }

  // ---------- Sending questions ----------
  async function sendQuestion(question){
    if (!question || !question.trim()) return;
    addUserMessage(question.trim());
    input.value = '';
    autoResize();
    sendBtn.disabled = true;
    addTypingIndicator();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: question.trim() })
      });

      if (!res.ok){
        throw new Error('Server responded with status ' + res.status);
      }

      const data = await res.json();
      removeTypingIndicator();
      addBotMessage(data.answer || '(No answer returned)', data.sources || []);
    } catch (err) {
      removeTypingIndicator();
      addErrorMessage(
        'Could not reach the LGU Assistant backend. Make sure the FastAPI server is running at ' + API_URL + '. (' + err.message + ')'
      );
    } finally {
      sendBtn.disabled = false;
    }
  }

  // ---------- Input bar behavior ----------
  function autoResize(){
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  }

  input.addEventListener('input', autoResize);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendQuestion(input.value);
    }
  });
  sendBtn.addEventListener('click', () => sendQuestion(input.value));

  document.querySelectorAll('.suggestion-chip').forEach(chip => {
    chip.addEventListener('click', () => sendQuestion(chip.dataset.q));
  });

  // ---------- Voice input (Web Speech API) ----------
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let listening = false;

  if (SpeechRecognition){
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onstart = () => {
      listening = true;
      micBtn.classList.add('listening');
      voiceHint.textContent = 'Listening… speak now';
      voiceHint.classList.add('active');
    };

    recognition.onresult = (event) => {
      let transcript = '';
      for (let i = 0; i < event.results.length; i++){
        transcript += event.results[i][0].transcript;
      }
      input.value = transcript;
      autoResize();
    };

    recognition.onerror = (event) => {
      voiceHint.textContent = 'Voice input error: ' + event.error;
      voiceHint.classList.remove('active');
    };

    recognition.onend = () => {
      listening = false;
      micBtn.classList.remove('listening');
      if (voiceHint.textContent === 'Listening… speak now'){
        voiceHint.textContent = '';
      }
      voiceHint.classList.remove('active');
      // auto-send if we captured something
      if (input.value.trim()){
        sendQuestion(input.value);
      }
    };

    micBtn.addEventListener('click', () => {
      if (listening){
        recognition.stop();
      } else {
        window.speechSynthesis.cancel();
        try {
          recognition.start();
        } catch (e) {
          // already started — ignore
        }
      }
    });
  } else {
    micBtn.addEventListener('click', () => {
      alert('Voice input is not supported in this browser. Try Chrome or Edge.');
    });
    micBtn.style.opacity = '0.4';
  }

  autoResize();
})();
</script>
