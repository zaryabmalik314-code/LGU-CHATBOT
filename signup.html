<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — LGU Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="auth-wrapper">
    <div class="seal">LGU</div>
    <div class="auth-card">
      <h1>Create your account</h1>
      <p class="subtitle">Sign up to start chatting with the LGU Assistant</p>

      <form id="signupForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@lgu.edu.pk" required autocomplete="email" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password" />
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter your password" required minlength="6" autocomplete="new-password" />
        </div>

        <button type="submit" class="btn-primary" id="signupBtn">Sign Up</button>

        <p class="message" id="formMessage"></p>
      </form>

      <p class="switch-link">Already have an account? <a href="login.html">Log in</a></p>
    </div>
    <p class="footer-note">LGU Chatbot &middot; Secured by Firebase Authentication</p>
  </div>

  <script type="module">
    import { auth } from "./firebase-config.js";
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const form = document.getElementById("signupForm");
    const messageEl = document.getElementById("formMessage");
    const signupBtn = document.getElementById("signupBtn");

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = "message " + type;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      signupBtn.disabled = true;
      signupBtn.textContent = "Creating account...";
      showMessage("", "");

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Save basic user info so other pages (like index.html) can use it
        localStorage.setItem("lguUser", JSON.stringify({
          uid: user.uid,
          email: user.email
        }));

        showMessage("Account created! Redirecting...", "success");

        setTimeout(() => {
          window.location.href = "index.html";
        }, 800);

      } catch (error) {
        signupBtn.disabled = false;
        signupBtn.textContent = "Sign Up";

        // Friendlier error messages for common Firebase error codes
        let friendly = "Something went wrong. Please try again.";
        if (error.code === "auth/email-already-in-use") {
          friendly = "That email is already registered. Try logging in instead.";
        } else if (error.code === "auth/invalid-email") {
          friendly = "Please enter a valid email address.";
        } else if (error.code === "auth/weak-password") {
          friendly = "Password should be at least 6 characters.";
        }
        showMessage(friendly, "error");
      }
    });
  </script>

</body>
</html>
